<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kayyne</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(180deg,#06121d,#081826,#0b2236);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:hidden;
position:relative;
}

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020b14;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
color:white;
font-size:30px;
animation:fadeOut 2s forwards;
animation-delay:1.5s;
}

@keyframes fadeOut{
to{
opacity:0;
visibility:hidden;
}
}

.stars{
position:fixed;
width:100%;
height:100%;
background:url('https://i.ibb.co/9HB2sVt/stars.png');
animation:moveStars 60s linear infinite;
opacity:0.15;
}

@keyframes moveStars{
from{
transform:translateY(0);
}
to{
transform:translateY(-1000px);
}
}

.bg-glow{
position:fixed;
width:300px;
height:300px;
border-radius:50%;
filter:blur(100px);
z-index:0;
animation:float 6s infinite ease-in-out;
}

.glow1{
background:#ff00aa;
top:-50px;
left:-50px;
}

.glow2{
background:#00bfff;
bottom:-50px;
right:-50px;
animation-delay:3s;
}

@keyframes float{
0%{
transform:translateY(0px);
}
50%{
transform:translateY(20px);
}
100%{
transform:translateY(0px);
}
}

.container{
width:100%;
max-width:420px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border:2px solid transparent;
border-radius:35px;
padding:30px 20px;
text-align:center;
position:relative;
z-index:1;
box-shadow:0 0 40px rgba(0,0,0,0.5);
animation:floating 4s ease-in-out infinite,rgbBorder 5s linear infinite;
}

@keyframes rgbBorder{
0%{
box-shadow:0 0 20px #ff0000;
}
25%{
box-shadow:0 0 20px #00ff00;
}
50%{
box-shadow:0 0 20px #00ffff;
}
75%{
box-shadow:0 0 20px #ff00ff;
}
100%{
box-shadow:0 0 20px #ff0000;
}
}

@keyframes floating{
0%{
transform:translateY(0px);
}
50%{
transform:translateY(-10px);
}
100%{
transform:translateY(0px);
}
}

.profile{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid white;
box-shadow:0 0 25px rgba(255,255,255,0.3);
animation:pulse 3s infinite;
}

@keyframes pulse{
0%{
transform:scale(1);
}
50%{
transform:scale(1.05);
}
100%{
transform:scale(1);
}
}

h1{
color:white;
margin-top:18px;
font-size:35px;
}

.desc{
color:#b3b3b3;
margin-top:8px;
margin-bottom:20px;
font-size:14px;
}

.music-btn{
margin-bottom:20px;
padding:10px 20px;
border:none;
border-radius:999px;
background:white;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.music-btn:hover{
transform:scale(1.05);
}

.link{
width:100%;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.15);
border-radius:999px;
padding:14px;
display:flex;
align-items:center;
gap:15px;
margin-bottom:18px;
text-decoration:none;
transition:0.3s ease;
}

.link:hover{
transform:scale(1.03);
background:rgba(255,255,255,0.1);
box-shadow:0 0 20px rgba(255,255,255,0.2);
}

.link img{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
background:white;
padding:6px;
transition:0.4s;
}

.link:hover img{
transform:rotate(15deg) scale(1.1);
}

.text{
text-align:left;
}

.text h2{
color:white;
font-size:18px;
margin-bottom:5px;
}

.text p{
color:#bfbfbf;
font-size:13px;
}

.watermark{
margin-top:25px;
font-size:14px;
font-family:cursive;
font-weight:bold;
background:linear-gradient(90deg,#ff00ff,#00ffff,#ffffff,#ff00ff);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:rgbText 5s linear infinite;
letter-spacing:2px;
}

@keyframes rgbText{
0%{
background-position:0% 50%;
}
50%{
background-position:100% 50%;
}
100%{
background-position:0% 50%;
}
}

.lightning{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
z-index:99999;
}

.flash{
animation:flash 0.3s;
}

@keyframes flash{
0%{
opacity:0;
}
50%{
opacity:0.8;
}
100%{
opacity:0;
}
}

</style>
</head>

<body>

<div class="lightning" id="lightning"></div>

<div id="loader">
<h1>Loading...</h1>
</div>

<div class="stars"></div>

<audio id="music" loop>
<source src="https://files.catbox.moe/8fadoa.mp3" type="audio/mpeg">
</audio>

<div class="bg-glow glow1"></div>
<div class="bg-glow glow2"></div>

<div class="container">

<img src="profile.jpg" class="profile">

<h1>@Kayyne</h1>

<p class="desc">
welcome to my social media ✨
</p>

<button onclick="document.getElementById('music').play()" class="music-btn">
🎵 Play Music
</button>

<a class="link" onclick="flashEffect()" href="https://wa.me/6282241102321" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">

<div class="text">
<h2>WhatsApp</h2>
<p>Chat gua di wangsaf</p>
</div>
</a>

<a class="link" onclick="flashEffect()" href="https://instagram.com/@too.dika" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">

<div class="text">
<h2>Instagram</h2>
<p>Follow IG gua bray</p>
</div>
</a>

<a class="link" onclick="flashEffect()" href="https://tiktok.com/@kayyneee" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">

<div class="text">
<h2>TikTok</h2>
<p>Follow juga Tiktok gua</p>
</div>
</a>

<p class="watermark">
@Made By Kayyne
</p>

</div>

<script>

function flashEffect(){
const flash=document.getElementById("lightning");

flash.classList.add("flash");

setTimeout(()=>{
flash.classList.remove("flash");
},300);
}

</script>

</body>
</html>
