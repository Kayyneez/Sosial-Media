<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kayyne ORIGIN OS 6</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
height:100vh;
overflow:hidden;
background:black;
transition:.4s;
}

/* MODE */
body.low{filter:brightness(.7) contrast(.9);}
body.ultra{filter:brightness(1.1) contrast(1.2);}

/* SPACE */
.space{
position:fixed;inset:0;
background:
radial-gradient(circle at 20% 30%,#ff00aa33,transparent 40%),
radial-gradient(circle at 70% 60%,#00ffff33,transparent 40%),
radial-gradient(circle at 50% 50%,#6a00ff22,transparent 60%);
filter:blur(25px);
}

/* STARS */
.stars{
position:fixed;inset:0;
background:radial-gradient(2px 2px at 20px 30px,#fff,transparent);
background-size:300px 300px;
animation:move 100s linear infinite;
opacity:.4;
}
@keyframes move{to{transform:translateY(-1200px);}}

/* UI */
.container{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
width:320px;
padding:20px;
text-align:center;
color:white;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-radius:20px;
}

/* PROFILE */
.profile{
width:90px;
height:90px;
border-radius:50%;
border:3px solid cyan;
box-shadow:0 0 20px cyan;
margin-bottom:10px;
cursor:pointer;
}

/* LINKS */
.link{
display:block;
margin:10px 0;
padding:12px;
border-radius:999px;
background:rgba(255,255,255,0.08);
color:white;
text-decoration:none;
}

/* METEOR */
.meteor{
position:fixed;inset:0;
background:radial-gradient(circle,orange,transparent);
opacity:0;
pointer-events:none;
}
.meteor.active{animation:boom .4s;}
@keyframes boom{50%{opacity:1;}}

/* LOADER */
#intro{
position:fixed;inset:0;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

.portal{
width:120px;height:120px;
border-radius:50%;
border:2px solid cyan;
border-top:2px solid magenta;
animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* CMD */
#cmd{
position:fixed;
bottom:80px;
left:20px;
background:rgba(0,0,0,.85);
color:#0ff;
padding:10px;
border-radius:10px;
font-size:12px;
display:none;
width:240px;
z-index:9999;
}

#cmdInput{
width:100%;
margin-top:5px;
padding:6px;
background:black;
color:#0ff;
border:none;
outline:none;
border-radius:6px;
}

/* BUTTONS */
button{
position:fixed;
bottom:20px;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
z-index:9999;
}

#modeBtn{left:20px;}
#soundBtn{right:20px;}

/* ROCKET CMD BUTTON */
#rocket{
position:fixed;
top:15px;
right:15px;
background:#ff0;
border:none;
padding:10px;
border-radius:50%;
cursor:pointer;
font-size:16px;
z-index:9999;
}

</style>
</head>

<body class="ultra">

<!-- SPACE -->
<div class="space"></div>
<div class="stars"></div>
<div class="meteor" id="meteor"></div>

<!-- ROCKET CMD BUTTON -->
<button id="rocket" onclick="toggleCMD()">🚀</button>

<!-- UI -->
<div class="container">

<img src="profile.jpg" class="profile" id="profile">

<h2>@Kaynne</h2>

<a class="link" href="https://wa.me/6282241102321">📞 My Wangsaff</a>
<a class="link" href="https://instagram.com/too.dika">📸 My IG</a>
<a class="link" href="https://tiktok.com/@kayyneee">🔮 My Tiktok</a>

</div>

<!-- CMD -->
<div id="cmd">
<div id="cmdLog">CMD READY</div>
<input id="cmdInput" placeholder="/help">
</div>

<!-- BUTTONS -->
<button id="modeBtn" onclick="toggleMode()">MODE</button>
<button id="soundBtn" onclick="toggleSound()">SOUND</button>

<script>

/* ================= AUDIO ================= */
const AudioEngine={
ctx:new (window.AudioContext||window.webkitAudioContext)(),
master:null,
ambient:null,
enabled:true,
unlocked:false,

init(){
this.master=this.ctx.createGain();
this.master.gain.value=0.3;
this.master.connect(this.ctx.destination);
},

unlock(){
if(this.unlocked) return;
this.ctx.resume();
this.startAmbient();
this.unlocked=true;
},

beep(type){

if(!this.enabled) return;

let f=440;
if(type==="meteor")f=120;
if(type==="unlock")f=900;
if(type==="click")f=600;

const o=this.ctx.createOscillator();
const g=this.ctx.createGain();

o.type="sine";
o.frequency.value=f;
g.gain.value=0.3;

o.connect(g);
g.connect(this.master);

g.gain.setValueAtTime(0.3,this.ctx.currentTime);
g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+0.2);

o.start();
o.stop(this.ctx.currentTime+0.2);
},

startAmbient(){
if(this.ambient || !this.enabled) return;

const o=this.ctx.createOscillator();
const g=this.ctx.createGain();

o.type="sine";
o.frequency.value=55;
g.gain.value=0.05;

o.connect(g);
g.connect(this.master);

o.start();
this.ambient=o;
},

stopAmbient(){
if(this.ambient){
this.ambient.stop();
this.ambient=null;
}
},

toggle(){
this.enabled=!this.enabled;
if(!this.enabled){
this.stopAmbient();
}else{
this.startAmbient();
}
alert(this.enabled?"SOUND ON":"SOUND OFF");
}
};

AudioEngine.init();

/* UNLOCK AUDIO */
document.body.addEventListener("click",()=>AudioEngine.unlock(),{once:true});

/* MODE */
function toggleMode(){

if(document.body.classList.contains("ultra")){
document.body.classList.remove("ultra");
document.body.classList.add("low");
clearInterval(window.meteorLoop);
AudioEngine.stopAmbient();
document.querySelector(".stars").style.opacity="0.1";
}else{
document.body.classList.add("ultra");
document.body.classList.remove("low");
startMeteor();
document.querySelector(".stars").style.opacity="0.4";
}
}

/* SOUND */
function toggleSound(){
AudioEngine.toggle();
}

/* METEOR */
function startMeteor(){

clearInterval(window.meteorLoop);

window.meteorLoop=setInterval(()=>{

if(!document.body.classList.contains("ultra")) return;

AudioEngine.beep("meteor");

let m=document.getElementById("meteor");
m.classList.add("active");
setTimeout(()=>m.classList.remove("active"),400);

},3000);
}

/* CMD */
let cmdOpen=false;
const cmd=document.getElementById("cmd");
const input=document.getElementById("cmdInput");
const log=document.getElementById("cmdLog");

function toggleCMD(){
cmdOpen=!cmdOpen;
cmd.style.display=cmdOpen?"block":"none";
if(cmdOpen) input.focus();
}

document.addEventListener("keydown",(e)=>{
if(e.key==="c") toggleCMD();
});

input.addEventListener("keydown",(e)=>{
if(e.key!=="Enter") return;

let v=input.value.toLowerCase();
input.value="";

if(v==="/help") log.innerText="/ultra /low /sound /meteor /god /void /reset";

else if(v==="/ultra"){
document.body.classList.add("ultra");
document.body.classList.remove("low");
AudioEngine.startAmbient();
startMeteor();
log.innerText="ULTRA MODE";
}

else if(v==="/low"){
document.body.classList.add("low");
document.body.classList.remove("ultra");
AudioEngine.stopAmbient();
log.innerText="LOW MODE";
}

else if(v==="/sound"){
AudioEngine.toggle();
log.innerText="SOUND TOGGLE";
}

else if(v==="/meteor"){
AudioEngine.beep("meteor");
log.innerText="METEOR BURST";
}

else if(v==="/god"){
AudioEngine.beep("unlock");
document.body.style.filter="hue-rotate(180deg)";
log.innerText="GOD MODE";
}

else if(v==="/void"){
document.body.style.filter="invert(1)";
log.innerText="VOID MODE";
}

else if(v==="/reset"){
location.reload();
}

else{
log.innerText="UNKNOWN COMMAND";
}
});

/* PROFILE EASTER EGG */
let p=0;
document.getElementById("profile").onclick=()=>{
p++;
if(p===5){
AudioEngine.beep("unlock");
document.body.style.filter="contrast(1.5)";
alert("GOD PROFILE MODE");
}
};

/* ROCKET EASTER EGG */
let r=0;
document.getElementById("rocket").onclick=()=>{
r++;
if(r===7){
AudioEngine.beep("unlock");
document.body.style.filter="hue-rotate(90deg)";
alert("SECRET SPACE MODE");
}
};

/* START */
setTimeout(()=>{
document.getElementById("intro").style.display="none";
AudioEngine.unlock();
startMeteor();
},3000);

</script>

</body>
</html>
