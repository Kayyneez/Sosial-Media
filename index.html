<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaynne Galaxy Ultimate V3</title>

<style>

/* ================= BASIC ================= */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{height:100vh;overflow:hidden;background:black;transition:.4s;}

/* ================= MODES ================= */
body.low{--blur:10px;}
body.ultra{--blur:35px;}

/* ================= SPACE ================= */
.space{
position:fixed;inset:0;
background:
radial-gradient(circle at 20% 30%,#ff00aa33,transparent 40%),
radial-gradient(circle at 70% 60%,#00ffff33,transparent 40%),
radial-gradient(circle at 50% 50%,#6a00ff22,transparent 60%);
filter:blur(var(--blur,25px));
animation:move 10s infinite alternate;
}
@keyframes move{to{transform:scale(1.1);}}

/* ================= STARS ================= */
.stars{
position:fixed;inset:0;
background:radial-gradient(2px 2px at 20px 30px,#fff,transparent),
radial-gradient(1px 1px at 80px 90px,#fff,transparent);
background-size:300px 300px;
animation:stars 120s linear infinite;
opacity:.35;
}
body.low .stars{opacity:.1;animation:none;}
@keyframes stars{to{transform:translateY(-1200px);}}

/* ================= PLANET ================= */
.planet{
position:fixed;
width:80px;height:80px;
border-radius:50%;
background:radial-gradient(circle,#00ffff,#003344);
box-shadow:0 0 25px cyan;
top:15%;left:10%;
cursor:pointer;
}
body.ultra .planet{animation:orbit 18s linear infinite;}
@keyframes orbit{
0%{transform:translate(0,0);}
25%{transform:translate(200px,50px);}
50%{transform:translate(0,200px);}
75%{transform:translate(-200px,50px);}
100%{transform:translate(0,0);}
}

/* ================= UI ================= */
.container{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
width:340px;
padding:20px;
text-align:center;
color:white;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-radius:20px;
}

/* ================= LINKS ================= */
.link{
display:block;
margin:10px 0;
padding:12px;
border-radius:999px;
background:rgba(255,255,255,0.08);
color:white;
text-decoration:none;
transition:.3s;
}
.link:hover{transform:scale(1.05);background:rgba(0,255,255,0.15);}

/* ================= METEOR ================= */
.meteor{
position:fixed;inset:0;
background:radial-gradient(circle,orange,transparent);
opacity:0;
pointer-events:none;
}
.meteor.active{animation:boom .4s;}
@keyframes boom{50%{opacity:1;}}

/* ================= TRAIL ================= */
.trail{
position:fixed;
width:6px;height:6px;
border-radius:50%;
background:white;
pointer-events:none;
animation:fade .7s forwards;
}
body.low .trail{display:none;}
@keyframes fade{to{opacity:0;transform:scale(0);}}

/* ================= LOADER ================= */
#intro{
position:fixed;inset:0;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:99999;
overflow:hidden;
}

.warp{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
animation:warp 3.5s ease forwards;
}

@keyframes warp{
0%{transform:scale(1) rotate(0);}
70%{transform:scale(1.4) rotate(180deg);}
100%{transform:scale(2.5) rotate(360deg);opacity:0;}
}

.portal{
width:140px;height:140px;
position:relative;
}

.ring{
position:absolute;inset:0;
border-radius:50%;
border:2px solid cyan;
animation:spin 1.2s linear infinite;
}

.ring:nth-child(2){border-color:magenta;animation-duration:1.8s;}
.ring:nth-child(3){border-color:white;animation-duration:2.4s;}

.core{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
width:18px;height:18px;
background:cyan;
border-radius:50%;
box-shadow:0 0 20px cyan;
}

@keyframes spin{to{transform:rotate(360deg);} }

#intro h1{
color:white;
font-size:14px;
letter-spacing:4px;
margin-top:20px;
animation:glow 1.2s infinite;
}
@keyframes glow{50%{opacity:.4;transform:scale(1.05);}}

/* ================= TOGGLE ================= */
.toggle{
position:fixed;
bottom:20px;
left:20px;
z-index:999;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body class="ultra">

<!-- LOADER -->
<div id="intro">
  <div class="warp">
    <div class="portal">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="core"></div>
    </div>
  </div>
  <h1>ENTERING GALAXY...</h1>
</div>

<!-- SPACE -->
<div class="space"></div>
<div class="stars"></div>
<div class="planet" id="planet"></div>
<div class="meteor" id="meteor"></div>

<!-- UI -->
<div class="container">

<h2>@Kaynne</h2>

<a class="link" href="https://wa.me/6282241102321">📞 My Wangsaf</a>
<a class="link" href="https://www.instagram.com/too.dikaa?igsh=bnAxczJ5ZGw0bGZv">📸 My Instagram</a>
<a class="link" href="https://tiktok.com/@kayyneee">🔮 My TikTok</a>

</div>

<button class="toggle" onclick="toggleMode()">⚡ / 🚀</button>

<script>

/* ================= AUDIO ENGINE ================= */
const AudioEngine={
ctx:new (window.AudioContext||window.webkitAudioContext)(),
master:null,
ambient:null,

init(){
this.master=this.ctx.createGain();
this.master.gain.value=0.08;
this.master.connect(this.ctx.destination);
},

beep(type){

if(document.body.classList.contains("low")) return;

let f=400;
if(type==="click")f=600;
if(type==="meteor")f=90;
if(type==="unlock")f=900;

const o=this.ctx.createOscillator();
const g=this.ctx.createGain();

o.type="sine";
o.frequency.value=f;
g.gain.value=0.1;

o.connect(g);
g.connect(this.master);

o.start();
o.stop(this.ctx.currentTime+0.15);
},

startAmbient(){

if(this.ambient) return;
if(document.body.classList.contains("low")) return;

const o=this.ctx.createOscillator();
const g=this.ctx.createGain();

o.type="sine";
o.frequency.value=55;
g.gain.value=0.03;

o.connect(g);
g.connect(this.master);

o.start();
this.ambient=o;
},

stopAmbient(){
if(this.ambient){
this.ambient.stop();
this.ambient=null;
}
}
};

AudioEngine.init();

/* start ambient after warp */
setTimeout(()=>AudioEngine.startAmbient(),2000);

/* ================= MODE ================= */
function toggleMode(){
if(document.body.classList.contains("ultra")){
document.body.classList.remove("ultra");
document.body.classList.add("low");
AudioEngine.stopAmbient();
alert("LOW MODE");
}else{
document.body.classList.add("ultra");
document.body.classList.remove("low");
AudioEngine.startAmbient();
alert("ULTRA MODE");
}
}

/* ================= TRAIL ================= */
document.addEventListener("mousemove",(e)=>{
if(document.body.classList.contains("low")) return;

const t=document.createElement("div");
t.className="trail";
t.style.left=e.clientX+"px";
t.style.top=e.clientY+"px";
document.body.appendChild(t);
setTimeout(()=>t.remove(),700);
});

/* ================= METEOR ================= */
setInterval(()=>{
if(!document.body.classList.contains("ultra")) return;

AudioEngine.beep("meteor");

let m=document.getElementById("meteor");
m.classList.add("active");
setTimeout(()=>m.classList.remove("active"),400);

},5000);

/* ================= LINKS ================= */
document.querySelectorAll(".link").forEach(el=>{
el.addEventListener("click",()=>{
AudioEngine.beep("click");
});
});

/* ================= PLANET ================= */
document.getElementById("planet").onclick=()=>{
AudioEngine.beep("click");
alert("Planet Active");
};

/* ================= EASTER EGG ================= */
let c=0;
document.body.addEventListener("click",(e)=>{
if(e.target.classList.contains("link")) return;

c++;
if(c===10){
AudioEngine.beep("unlock");
document.body.style.filter="hue-rotate(180deg)";
alert("GALAXY GLITCH MODE");
}
});

/* ================= LOADER REMOVE ================= */
setTimeout(()=>{
document.getElementById("intro").style.display="none";
},3500);

</script>

</body>
</html>
