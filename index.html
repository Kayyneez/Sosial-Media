<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programmed Love - Botol Yakult</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* --- ANIMASI LOADER (LOADING SCREEN) --- */
        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid #ff4d6d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        .loading-text {
            color: #ffffff;
            font-size: 1.2rem;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- HALAMAN KLIK AWAL --- */
        #welcome-page {
            position: absolute;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s ease, visibility 1s;
        }

        #welcome-page.show {
            opacity: 1;
            visibility: visible;
        }

        #welcome-page.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .click-btn {
            background: none;
            border: 2px solid #ff4d6d;
            color: #ff4d6d;
            padding: 15px 30px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 77, 109, 0.3);
        }

        .click-btn:hover {
            background-color: #ff4d6d;
            color: #000;
            box-shadow: 0 0 25px rgba(255, 77, 109, 0.8);
            transform: scale(1.05);
        }

        .heart-icon {
            font-size: 3rem;
            margin-top: 20px;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* --- KONTEN UTAMA --- */
        #heart-container {
            position: relative;
            width: 600px;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease-in;
        }

        #heart-container.show {
            opacity: 1;
        }

        /* Teks Nama di Tengah */
        .center-name {
            position: absolute;
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: bold;
            text-shadow: 0 0 15px #ff4d6d, 0 0 30px #ff4d6d;
            z-index: 5;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            animation: name-glow 2s infinite alternate;
        }

        @keyframes name-glow {
            0% { transform: scale(0.95); text-shadow: 0 0 10px #ff4d6d; }
            100% { transform: scale(1.05); text-shadow: 0 0 25px #ff4d6d, 0 0 40px #ff53d9; }
        }

        /* Teks "I Love You" Berjalan */
        .i_love_word {
            color: #ead6be;
            font-size: 1.1rem;
            position: absolute;
            text-shadow: 0 0 8px #ff53d9;
            white-space: nowrap;
            opacity: 0;
            animation: follow-path 5s infinite linear;
        }

        @keyframes follow-path {
            0% {
                opacity: 0;
                transform: translate(var(--x0), var(--y0)) scale(0.6);
            }
            4% {
                opacity: 1;
            }
            85% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(var(--x1), var(--y1)) scale(0.6);
            }
        }
    </style>
</head>
<body>

    <div id="loader-container">
        <div class="spinner"></div>
        <div class="loading-text">Memuat...</div>
    </div>

    <audio id="backsound" src="audio.mp3" loop></audio>

    <div id="welcome-page">
        <button class="click-btn" onclick="startLoveAnimation()">Coba Klik</button>
    </div>

    <div id="heart-container">
        <div class="center-name" id="center-text" style="display: none;">Botol Yakult</div>
    </div>

    <script>
        let isMusicPlaying = false; // Penanda status musik

        // Efek Loader Menghilang setelah 2.5 detik
        setTimeout(() => {
            const loader = document.getElementById('loader-container');
            const welcomePage = document.getElementById('welcome-page');
            
            loader.style.opacity = '0';
            loader.style.visibility = 'hidden';
            welcomePage.classList.add('show');
        }, 2500);

        // Rumus matematika bentuk hati
        function getHeartPoint(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            return { x: x * 13, y: y * 13 };
        }

        function startLoveAnimation() {
            const audio = document.getElementById('backsound');
            audio.play().then(() => {
                isMusicPlaying = true; // Set ke true jika musik berhasil diputar
            }).catch(error => {
                console.log("Audio gagal berputar:", error);
            });

            document.getElementById('welcome-page').classList.remove('show');
            document.getElementById('welcome-page').classList.add('hidden');
            
            const container = document.getElementById('heart-container');
            container.classList.add('show');
            document.getElementById('center-text').style.display = 'block';

            const totalWords = 60; 
            const baseDuration = 5; 

            for (let i = 0; i < totalWords; i++) {
                const word = document.createElement('div');
                word.className = 'i_love_word';
                word.innerText = 'I love you';

                const startPos = getHeartPoint(0);
                word.style.setProperty('--x0', `${startPos.x}px`);
                word.style.setProperty('--y0', `${startPos.y}px`);

                const endPos = getHeartPoint(2 * Math.PI);
                word.style.setProperty('--x1', `${endPos.x}px`);
                word.style.setProperty('--y1', `${endPos.y}px`);

                let keyframes = `@keyframes path-${i} {`;
                const steps = 20; 
                
                for (let j = 0; j <= steps; j++) {
                    const pct = j / steps;
                    const t = pct * 2 * Math.PI; 
                    const currentPos = getHeartPoint(t);
                    
                    let opacity = 1;
                    if (pct < 0.05) opacity = pct / 0.05;
                    if (pct > 0.90) opacity = (1 - pct) / 0.10;

                    keyframes += `
                        ${pct * 100}% {
                            opacity: ${opacity};
                            transform: translate(${currentPos.x}px, ${currentPos.y}px);
                        }
                    `;
                }
                keyframes += `}`;

                const style = document.createElement('style');
                style.innerHTML = keyframes;
                document.head.appendChild(style);

                word.style.animation = `path-${i} ${baseDuration}s infinite linear`;
                word.style.animationDelay = `${(i / totalWords) * baseDuration}s`;

                container.appendChild(word);
            }
        }

        /* --- FITUR AUTO MUTE SAAT MENINGGALKAN WEB --- */
        document.addEventListener('visibilitychange', function() {
            const audio = document.getElementById('backsound');
            
            if (document.hidden) {
                // Jika user pindah tab, buka aplikasi lain, atau meminimalkan browser
                audio.pause();
            } else {
                // Jika user kembali ke halaman web ini
                if (isMusicPlaying) {
                    audio.play().catch(err => console.log(err));
                }
            }
        });
    </script>
</body>
</html>
