<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ================= RESET ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
overflow:hidden;
background:black;
transition:.5s;
}

/* ================= MODE ================= */
body.low{
--blur:10px;
}

body.ultra{
--blur:35px;
}

/* ================= PORTAL LOADER ================= */
#intro{
position:fixed;
inset:0;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:99999;
}

.portal{
width:120px;
height:120px;
position:relative;
margin-bottom:20px;
}

.ring{
position:absolute;
inset:0;
border-radius:50%;
border:2px solid rgba(0,255,255,0.4);
animation:spin 1.5s linear infinite;
}

.ring:nth-child(2){border-color:rgba(255,0,255,0.4);animation-duration:2.2s;}
.ring:nth-child(3){border-color:rgba(255,255,255,0.2);animation-duration:3s;}

.core{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:18px;
height:18px;
background:cyan;
border-radius:50%;
box-shadow:0 0 20px cyan;
}

@keyframes spin{to{transform:rotate(360deg);}}

/* ================= SPACE ================= */
.space{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 30%,#ff00aa33,transparent 40%),
radial-gradient(circle at 70% 60%,#00ffff33,transparent 40%),
radial-gradient(circle at 50% 50%,#6a00ff22,transparent 60%);
filter:blur(var(--blur,25px));
animation:move 12s infinite alternate;
}

@keyframes move{to{transform:scale(1.1);}}

/* STARS */
.stars{
position:fixed;
inset:0;
background:
radial-gradient(2px 2px at 20px 30px,#fff,transparent),
radial-gradient(1px 1px at 80px 90px,#fff,transparent),
radial-gradient(1px 1px at 130px 40px,#fff,transparent);
background-size:300px 300px;
animation:stars 120s linear infinite;
}

body.low .stars{opacity:.1;animation:none;}
body.ultra .stars{opacity:.35;}

@keyframes stars{to{transform:translateY(-1200px);}}

/* ================= PLANET ================= */
.planet{
position:fixed;
width:80px;
height:80px;
border-radius:50%;
background:radial-gradient(circle,#00ffff,#003344);
box-shadow:0 0 25px cyan;
top:15%;
left:10%;
cursor:pointer;
}

body.ultra .planet{animation:orbit 18s linear infinite;}
body.low .planet{animation:none;}

@keyframes orbit{
0%{transform:translate(0,0);}
25%{transform:translate(200px,50px);}
50%{transform:translate(0,200px);}
75%{transform:translate(-200px,50px);}
100%{transform:translate(0,0);}
}

/* ================= UI ================= */
.container{
width:380px;
padding:25px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-radius:25px;
text-align:center;
color:white;
z-index:2;
animation:floating 5s infinite ease-in-out;
position:relative;
}

@keyframes floating{50%{transform:translateY(-10px);}}

/* ================= PROFILE ================= */
.profile{
width:100px;
height:100px;
border-radius:50%;
border:3px solid white;
cursor:pointer;
}

/* ================= LINKS ================= */
.link{
display:flex;
align-items:center;
justify-content:center;
padding:14px;
margin:10px 0;
border-radius:999px;
background:rgba(255,255,255,0.08);
color:white;
text-decoration:none;
transition:.3s;
}

.link:hover{
transform:scale(1.05);
background:rgba(0,255,255,0.15);
}

/* ================= TRAIL ================= */
.trail{
position:fixed;
width:6px;
height:6px;
border-radius:50%;
background:white;
pointer-events:none;
animation:fade .7s forwards;
}

body.low .trail{display:none;}

@keyframes fade{to{opacity:0;transform:scale(0);}}

/* ================= METEOR ================= */
.meteor{
position:fixed;
inset:0;
background:radial-gradient(circle,orange,transparent);
opacity:0;
pointer-events:none;
z-index:9999;
}

.meteor.active{animation:boom .5s ease;}

@keyframes boom{
50%{opacity:1;}
100%{opacity:0;}
}

/* ================= BUTTON ================= */
.toggle{
position:fixed;
bottom:20px;
left:20px;
z-index:999;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

/* ================= WATERMARK ================= */
.watermark{
margin-top:15px;
font-size:13px;
font-family:cursive;
background:linear-gradient(90deg,#ff00ff,#00ffff,#fff,#ff00ff);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:wm 4s linear infinite;
cursor:pointer;
}

@keyframes wm{50%{background-position:100%;}}

</style>
</head>

<script>
