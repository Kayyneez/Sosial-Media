<title>Kayyne</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(180deg,#06121d,#081826,#0b2236);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:hidden;
position:relative;
}

.bg-glow{
position:fixed;
width:300px;
height:300px;
border-radius:50%;
filter:blur(100px);
z-index:0;
animation:float 6s infinite ease-in-out;
}

.glow1{
background:#ff00aa;
top:-50px;
left:-50px;
}

.glow2{
background:#00bfff;
bottom:-50px;
right:-50px;
animation-delay:3s;
}

@keyframes float{
0%{
transform:translateY(0px);
}
50%{
transform:translateY(20px);
}
100%{
transform:translateY(0px);
}
}

.container{
width:100%;
max-width:420px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border:2px solid transparent;
border-radius:35px;
padding:30px 20px;
text-align:center;
position:relative;
z-index:1;
box-shadow:0 0 40px rgba(0,0,0,0.5);
animation:floating 4s ease-in-out infinite,rgbBorder 5s linear infinite;
}

@keyframes rgbBorder{
0%{
box-shadow:0 0 20px #ff0000;
}
25%{
box-shadow:0 0 20px #00ff00;
}
50%{
box-shadow:0 0 20px #00ffff;
}
75%{
box-shadow:0 0 20px #ff00ff;
}
100%{
box-shadow:0 0 20px #ff0000;
}
}

@keyframes floating{
0%{
transform:translateY(0px);
}
50%{
transform:translateY(-10px);
}
100%{
transform:translateY(0px);
}
}

.profile{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid white;
box-shadow:0 0 25px rgba(255,255,255,0.3);
animation:pulse 3s infinite;
}

@keyframes pulse{
0%{
transform:scale(1);
}
50%{
transform:scale(1.05);
}
100%{
transform:scale(1);
}
}

h1{
color:white;
margin-top:18px;
font-size:35px;
}

.desc{
color:#b3b3b3;
margin-top:8px;
margin-bottom:30px;
font-size:14px;
}

.link{
width:100%;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.15);
border-radius:999px;
padding:14px;
display:flex;
align-items:center;
gap:15px;
margin-bottom:18px;
text-decoration:none;
transition:0.3s ease;
}

.link:hover{
transform:scale(1.03);
background:rgba(255,255,255,0.1);
box-shadow:0 0 20px rgba(255,255,255,0.2);
}

.link img{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
background:white;
padding:6px;
transition:0.4s;
}

.link:hover img{
transform:rotate(15deg) scale(1.1);
}

.text{
text-align:left;
}

.text h2{
color:white;
font-size:18px;
margin-bottom:5px;
}

.text p{
color:#bfbfbf;
font-size:13px;
}

.watermark{
color:#8f8f8f;
margin-top:25px;
font-size:12px;
animation:fade 3s infinite;
}

@keyframes fade{
0%{opacity:0.4;}
50%{opacity:1;}
100%{opacity:0.4;}
}

</style>
</head>
