<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaynne Origin Os</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
height:100vh;
overflow:hidden;
background:black;
transition:.3s;
}

/* LOW MODE */
body.low{filter:brightness(.7) contrast(.9);}
body.low .stars{animation:none;opacity:.1;}
body.low .meteor{display:none;}

/* ULTRA MODE */
body.ultra{filter:brightness(1.2) contrast(1.2);}

/* GLITCH */
body.glitch{animation:glitch .2s infinite;}

@keyframes glitch{
0%{filter:hue-rotate(0deg) contrast(1.5);}
50%{filter:hue-rotate(120deg) contrast(2);}
100%{filter:hue-rotate(240deg) contrast(1.5);}
}

/* LOADER */
#loader{
position:fixed;inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
color:white;
gap:15px;
}

.portal{
width:90px;height:90px;
border-radius:50%;
border:3px solid cyan;
border-top:3px solid magenta;
border-right:3px solid white;
animation:spin 1s linear infinite;
box-shadow:0 0 20px cyan;
}

@keyframes spin{to{transform:rotate(360deg);}}

/* SPACE */
.space{
position:fixed;inset:0;
background:
radial-gradient(circle at 20% 30%,#ff00aa33,transparent 40%),
radial-gradient(circle at 70% 60%,#00ffff33,transparent 40%),
radial-gradient(circle at 50% 50%,#6a00ff22,transparent 60%);
filter:blur(25px);
}

/* STARS */
.stars{
position:fixed;inset:0;
background:radial-gradient(2px 2px at 20px 30px,#fff,transparent);
background-size:300px 300px;
animation:move 120s linear infinite;
opacity:.4;
}

@keyframes move{
to{transform:translateY(-1200px);}
}

/* UI */
.container{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
width:320px;
padding:20px;
text-align:center;
color:white;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-radius:20px;
}

.profile{
width:90px;height:90px;
border-radius:50%;
border:3px solid cyan;
box-shadow:0 0 20px cyan;
margin-bottom:10px;
}

/* LINKS */
.link{
display:block;
margin:10px 0;
padding:12px;
border-radius:999px;
background:rgba(255,255,255,0.08);
color:white;
text-decoration:none;
cursor:pointer; /* <-- TAMBAHAN INI */
transition:.2s;
}

.link:hover{
transform:scale(1.05);
background:rgba(0,255,255,0.15);
}

/* METEOR */
.meteor{
position:fixed;
inset:0;
background:radial-gradient(circle,orange,transparent);
opacity:0;
pointer-events:none;
}

.meteor.active{animation:boom .4s;}
@keyframes boom{50%{opacity:1;}}

/* BUTTONS */
.bottomBar{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
z-index:9999;
}

.btn{
border:none;
padding:12px 14px;
border-radius:999px;
background:#111;
color:white;
cursor:pointer;
}

/* WARP SCREEN */
#warpScreen{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
opacity:0;
pointer-events:none;
transition:.3s;
}

#warpScreen.active{
opacity:1;
pointer-events:auto;
}

#warpScreen::before{
content:"";
width:120px;
height:120px;
border-radius:50%;
border:3px solid cyan;
border-top:3px solid magenta;
animation:spin .8s linear infinite;
box-shadow:0 0 30px cyan;
}

</style>
</head>

<body class="ultra">

<!-- LOADER -->
<div id="loader">
<div class="portal"></div>
<h3>ENTERING GALAXY...</h3>
</div>

<!-- WARP -->
<div id="warpScreen"></div>

<!-- BACKGROUND -->
<div class="space"></div>
<div class="stars"></div>
<div class="meteor" id="meteor"></div>

<!-- UI -->
<div class="container">

<img src="profile.jpg" class="profile" id="profile">
<h2>@Kaynne</h2>

<a class="link" onclick="goTo('wa')">📞 My Wangsaff</a>
<a class="link" onclick="goTo('ig')">📸 My Ig</a>
<a class="link" onclick="goTo('tt')">🔮 My TikTok</a>

</div>

<!-- BUTTONS -->
<div class="bottomBar">
<button class="btn" onclick="setUltra()">⚡ ULTRA</button>
<button class="btn" onclick="setLow()">🪐 LOW</button>
<button class="btn" onclick="toggleMusic()">🎵</button>
</div>

<!-- MUSIC -->
<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>

/* STATE */
let mode="ultra";
let tapVoid=0;

/* ULTRA */
function setUltra(){
mode="ultra";
document.body.classList.add("ultra");
document.body.classList.remove("low","glitch");
startMeteor();
}

/* LOW */
function setLow(){
mode="low";
document.body.classList.add("low");
document.body.classList.remove("ultra","glitch");
stopMeteor();
}

/* MUSIC */
let music=document.getElementById("music");
let play=false;

function toggleMusic(){
if(!play){
music.play();play=true;
}else{
music.pause();play=false;
}
}

/* METEOR */
let meteorInterval=null;

function startMeteor(){
if(meteorInterval) return;

meteorInterval=setInterval(()=>{
if(mode!=="ultra") return;

let m=document.getElementById("meteor");
m.classList.add("active");

setTimeout(()=>m.classList.remove("active"),400);

},4000);
}

function stopMeteor(){
clearInterval(meteorInterval);
meteorInterval=null;
}

/* WARP TRANSITION LINK */
function goTo(type){

let link="";

if(type==="wa") link="https://wa.me/6282241102321";
if(type==="ig") link="https://www.instagram.com/too.dikaa?igsh=bnAxczJ5ZGw0bGZv";
if(type==="tt") link="https://tiktok.com/@kayyneee";

let warp=document.getElementById("warpScreen");
warp.classList.add("active");

setTimeout(()=>{
window.location.href=link;
},1200);

}

/* VOID MODE (5 TAP PROFILE) */
document.getElementById("profile").onclick=()=>{

tapVoid++;

if(tapVoid===5 && mode!=="void"){
mode="void";
document.body.classList.add("glitch");
document.body.classList.remove("low","ultra");
stopMeteor();
alert("🌀 VOID MODE");
tapVoid=0;
}

else if(tapVoid===5 && mode==="void"){
mode="ultra";
document.body.classList.remove("glitch");
document.body.classList.add("ultra");
startMeteor();
alert("🌌 BACK TO NORMAL");
tapVoid=0;
}

};

/* START */
startMeteor();

</script>

</body>
</html>
