<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaynne Origin OS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
height:100vh;
overflow:hidden;
background:black;
transition:.3s;
}

/* MODE */
body.low{filter:brightness(.7) contrast(.9);}
body.ultra{filter:brightness(1.2) contrast(1.2);}
body.glitch{animation:glitch .2s infinite;}

@keyframes glitch{
0%{filter:hue-rotate(0deg) contrast(1.5);}
50%{filter:hue-rotate(120deg) contrast(2);}
100%{filter:hue-rotate(240deg) contrast(1.5);}
}

/* LOADER */
#loader{
position:fixed;inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
color:white;
gap:10px;
}

.portal{
width:90px;height:90px;
border-radius:50%;
border:3px solid cyan;
border-top:3px solid magenta;
animation:spin 1s linear infinite;
box-shadow:0 0 20px cyan;
}

@keyframes spin{to{transform:rotate(360deg);}}

/* SPACE */
.space,.stars{
position:fixed;inset:0;
}

.space{
background:
radial-gradient(circle at 20% 30%,#ff00aa33,transparent 40%),
radial-gradient(circle at 70% 60%,#00ffff33,transparent 40%),
radial-gradient(circle at 50% 50%,#6a00ff22,transparent 60%);
filter:blur(25px);
}

.stars{
background:radial-gradient(2px 2px at 20px 30px,#fff,transparent);
background-size:300px 300px;
animation:move 120s linear infinite;
opacity:.4;
}

@keyframes move{to{transform:translateY(-1200px);}}

/* UI */
.container{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
width:320px;
padding:20px;
text-align:center;
color:white;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-radius:20px;
}

.profile{
width:90px;height:90px;
border-radius:50%;
border:3px solid cyan;
box-shadow:0 0 20px cyan;
margin-bottom:10px;
cursor:pointer;
}

.link{
display:block;
margin:10px 0;
padding:12px;
border-radius:999px;
background:rgba(255,255,255,0.08);
color:white;
text-decoration:none;
cursor:pointer;
transition:.2s;
}
.link:hover{transform:scale(1.05);}

/* STATUS */
#status{
margin-top:10px;
font-size:12px;
opacity:.7;
}

/* WARP */
#warp{
position:fixed;inset:0;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:99999;
opacity:0;
pointer-events:none;
transition:.3s;
}

#warp.active{
opacity:1;
pointer-events:auto;
}

.warpPortal{
width:120px;height:120px;
border-radius:50%;
border:3px solid cyan;
border-top:3px solid magenta;
animation:spin .5s linear infinite;
box-shadow:0 0 40px cyan;
}

#warpText{
color:white;
margin-top:15px;
font-size:14px;
opacity:.8;
}

/* BUTTON */
.bottomBar{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
}

.btn{
padding:10px 14px;
border-radius:999px;
border:none;
background:#111;
color:white;
cursor:pointer;
}

/* TOAST */
#toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.7);
color:white;
padding:10px 18px;
border-radius:999px;
font-size:14px;
opacity:0;
transition:.3s;
z-index:999999;
pointer-events:none;
}

#toast.show{
opacity:1;
transform:translateX(-50%) translateY(10px);
}

/* FLASH */
#flash{
position:fixed;
inset:0;
background:white;
opacity:0;
pointer-events:none;
z-index:999998;
transition:.2s;
}

#flash.active{
opacity:.4;
}

</style>
</head>

<body class="ultra">

<!-- LOADER -->
<div id="loader">
<div class="portal"></div>
<div>ENTERING GALAXY...</div>
</div>

<!-- WARP -->
<div id="warp">
<div class="warpPortal"></div>
<div id="warpText">tunggu sebentar...</div>
</div>

<div class="space"></div>
<div class="stars"></div>

<div class="container">

<img src="profile.jpg" class="profile" id="profile">
<h2>@Kaynne</h2>

<div id="status">⚡ ULTRA GRAPHIC ACTIVE</div>

<a class="link" onclick="go('wa')">📞 WhatsApp</a>
<a class="link" onclick="go('ig')">📸 Instagram</a>
<a class="link" onclick="go('tt')">🔮 TikTok</a>

<button class="btn" onclick="voiceAI()">🎤 Voice AI</button>
</div>

<div class="bottomBar">
<button class="btn" onclick="setUltra()">⚡ ULTRA</button>
<button class="btn" onclick="setLow()">🪐 LOW</button>
<button class="btn" onclick="toggleMusic()">🎵</button>
</div>

<div id="toast"></div>
<div id="flash"></div>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<audio id="sfxMode" src="https://actions.google.com/sounds/v1/ui/power_up.ogg"></audio>
<audio id="sfxWarp" src="https://actions.google.com/sounds/v1/transportation/airplane_takeoff.ogg"></audio>

<script>

/* LOADER */
window.addEventListener("load",()=>{
setTimeout(()=>{
document.getElementById("loader").remove();
},1200);
});

/* MODE */
let lastmode = "ultra";
let tapProfile = 0;
let isVoid = false;

/* TOAST */
function showToast(text){
let t=document.getElementById("toast");
t.innerText=text;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),1200);
}

/* FLASH */
function flash(){
let f=document.getElementById("flash");
f.classList.add("active");
setTimeout(()=>f.classList.remove("active"),150);
}

/* ULTRA */
function setUltra(){
mode="ultra";
document.body.classList.remove("low","glitch");
document.body.classList.add("ultra");

document.getElementById("status").innerText="⚡ ULTRA GRAPHIC ACTIVE";
showToast("⚡ ULTRA ON");
document.getElementById("sfxMode").play();
flash();
}

/* LOW */
function setLow(){
mode="low";
document.body.classList.remove("ultra","glitch");
document.body.classList.add("low");

document.getElementById("status").innerText="🪐 LOW MODE ACTIVE";
showToast("🪐 LOW ON");
document.getElementById("sfxMode").play();
flash();
}

/* MUSIC */
let music=document.getElementById("music");
let on=false;

function toggleMusic(){
if(!on){music.play();on=true;}
else{music.pause();on=false;}
}

/* WARP */
function go(type){
let link="";
if(type==="wa") link="https://wa.me/6282241102321";
if(type==="ig") link="https://www.instagram.com/too.dikaa?igsh=bnAxczJ5ZGw0bGZv";
if(type==="tt") link="https://tiktok.com/@kayyneee";

document.getElementById("warp").classList.add("active");
document.getElementById("sfxWarp").play();

setTimeout(()=>window.location.href=link,1200);
}

/* VOICE AI */
function voiceAI(){
let msg=new SpeechSynthesisUtterance("Welcome to my media sosial wok");
speechSynthesis.speak(msg);
}

/* EASTER EGG */
let tapProfile = 0;
let isVoid = false;

document.getElementById("profile").onclick = () => {

tapProfile++;

if (tapProfile >= 5 && !isVoid) {
isVoid = true;
tapProfile = 0;

mode = "void";
document.body.classList.add("glitch");
document.body.classList.remove("ultra","low");

showToast("🌀 VOID MODE ON");
return;
}

if (tapProfile >= 5 && isVoid) {
isVoid = false;
tapProfile = 0;

mode = "ultra";
document.body.classList.remove("glitch");
document.body.classList.add("ultra");

showToast("⚡ BACK TO NORMAL");
return;
}

};

</script>

</body>
</html>
