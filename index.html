<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kayyne Origin Os 6</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
height:100vh;
overflow:hidden;
background:black;
transition:.4s;
}

/* MODE */
body.low{filter:brightness(.7) contrast(.9);}
body.ultra{filter:brightness(1.15) contrast(1.2);}

/* LOADER */
#loader{
position:fixed;
inset:0;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:99999;
color:white;
gap:18px;
}

.portal{
width:90px;
height:90px;
border-radius:50%;
border:3px solid cyan;
border-top:3px solid magenta;
border-right:3px solid white;
animation:spin 1s linear infinite;
box-shadow:0 0 20px cyan;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

/* GALAXY */
.space{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 30%,#ff00aa33,transparent 40%),
radial-gradient(circle at 70% 60%,#00ffff33,transparent 40%),
radial-gradient(circle at 50% 50%,#6a00ff22,transparent 60%);
filter:blur(25px);
}

.stars{
position:fixed;
inset:0;
background:radial-gradient(2px 2px at 20px 30px,#fff,transparent);
background-size:300px 300px;
animation:move 120s linear infinite;
opacity:.4;
}
@keyframes move{to{transform:translateY(-1200px);}}

/* PROFILE */
.container{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
width:320px;
padding:20px;
text-align:center;
color:white;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-radius:20px;
}

.profile{
width:90px;
height:90px;
border-radius:50%;
border:3px solid cyan;
box-shadow:0 0 20px cyan;
margin-bottom:10px;
}

/* LINKS */
.link{
display:block;
margin:10px 0;
padding:12px;
border-radius:999px;
background:rgba(255,255,255,0.08);
color:white;
text-decoration:none;
}

/* METEOR */
.meteor{
position:fixed;
inset:0;
background:radial-gradient(circle,orange,transparent);
opacity:0;
pointer-events:none;
}
.meteor.active{animation:boom .4s;}
@keyframes boom{50%{opacity:1;}}

/* BOTTOM BAR */
.bottomBar{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:15px;
z-index:9999;
}

.btn{
border:none;
padding:12px 16px;
border-radius:999px;
cursor:pointer;
font-size:18px;
background:#111;
color:white;
box-shadow:0 0 10px rgba(0,255,255,0.4);
}

</style>
</head>

<body class="ultra">

<!-- LOADER -->
<div id="loader">
  <div class="portal"></div>
  <h3>ENTERING GALAXY...</h3>
</div>

<!-- BACKGROUND -->
<div class="space"></div>
<div class="stars"></div>
<div class="meteor" id="meteor"></div>

<!-- UI -->
<div class="container">

<img src="profile.jpg" class="profile">

<h2>@Kaynne</h2>

<a class="link" href="https://wa.me/6282241102321">📞 My Wangsaff</a>
<a class="link" href="https://www.instagram.com/too.dikaa?igsh=bnAxczJ5ZGw0bGZv">📸 My IG</a>
<a class="link" href="https://tiktok.com/@kayyneee">🔮 My TikTok</a>

</div>

<!-- BOTTOM BUTTONS -->
<div class="bottomBar">

<button class="btn" onclick="toggleMode()">⚡ / 🪐</button>
<button class="btn" onclick="toggleMusic()">🎵</button>

</div>

<!-- AUDIO -->
<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>

/* REMOVE LOADER */
window.addEventListener("load",()=>{
setTimeout(()=>{
let l=document.getElementById("loader");
if(l) l.remove();
},2000);
});

/* MODE */
function toggleMode(){
if(document.body.classList.contains("ultra")){
document.body.classList.remove("ultra");
document.body.classList.add("low");
}else{
document.body.classList.add("ultra");
document.body.classList.remove("low");
startMeteor();
}
}

/* MUSIC */
let music=document.getElementById("music");
let play=false;

function toggleMusic(){
if(!play){
music.play();
play=true;
}else{
music.pause();
play=false;
}
}

/* METEOR */
function startMeteor(){
setInterval(()=>{
if(!document.body.classList.contains("ultra")) return;

let m=document.getElementById("meteor");
m.classList.add("active");
setTimeout(()=>m.classList.remove("active"),400);

},4000);
}

/* START */
startMeteor();

</script>

</body>
</html>
