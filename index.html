<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kayyne Space</title>

<style>

/* ================= BASE ================= */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{
height:100vh;
overflow:hidden;
background:black;
}

/* ================= PERFORMANCE ================= */
:root{
--blur:40px;
--trail:1;
}

/* ================= CINEMATIC INTRO ================= */
#intro{
position:fixed;
inset:0;
background:black;
z-index:99999;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
animation:zoomOut 4s ease forwards;
}

#intro h1{
color:white;
font-size:20px;
letter-spacing:3px;
animation:glow 2s infinite;
}

@keyframes glow{
0%{opacity:0.4;}
50%{opacity:1;}
100%{opacity:0.4;}
}

@keyframes zoomOut{
0%{transform:scale(1.5);opacity:1;}
80%{opacity:1;}
100%{transform:scale(1);opacity:0;visibility:hidden;}
}

/* ================= SPACE BACKGROUND ================= */
.space{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 30%,#ff00aa33,transparent 40%),
radial-gradient(circle at 70% 60%,#00ffff33,transparent 40%),
radial-gradient(circle at 50% 50%,#6a00ff22,transparent 60%);
filter:blur(var(--blur));
}

/* stars */
.stars{
position:fixed;
inset:0;
background:
radial-gradient(2px 2px at 20px 30px,#fff,transparent),
radial-gradient(1px 1px at 80px 90px,#fff,transparent),
radial-gradient(1px 1px at 130px 40px,#fff,transparent);
background-size:300px 300px;
animation:move 120s linear infinite;
opacity:.3;
}

@keyframes move{
to{transform:translateY(-1200px);}
}

/* ================= PLANET ================= */
.planet{
position:fixed;
width:80px;
height:80px;
border-radius:50%;
background:radial-gradient(circle,#00ffff,#003344);
top:20%;
left:10%;
box-shadow:0 0 30px cyan;
animation:orbit 18s linear infinite;
cursor:pointer;
}

@keyframes orbit{
0%{transform:translate(0,0);}
25%{transform:translate(200px,50px);}
50%{transform:translate(0,200px);}
75%{transform:translate(-200px,50px);}
100%{transform:translate(0,0);}
}

/* ================= UI ================= */
.container{
position:relative;
z-index:2;
width:380px;
margin:auto;
top:50%;
transform:translateY(-50%);
text-align:center;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:20px;
border-radius:20px;
color:white;
}

.profile{
width:100px;
height:100px;
border-radius:50%;
border:3px solid white;
}

/* ================= LINKS ================= */
.link{
display:flex;
align-items:center;
gap:10px;
padding:12px;
margin:10px 0;
border-radius:50px;
background:rgba(255,255,255,0.08);
cursor:pointer;
transition:.3s;
}

.link:hover{
transform:scale(1.05);
background:rgba(255,255,255,0.15);
}

/* ================= CURSOR TRAIL ================= */
.trail{
position:fixed;
width:6px;
height:6px;
background:white;
border-radius:50%;
pointer-events:none;
animation:fade .7s forwards;
}

@keyframes fade{
to{opacity:0;transform:scale(0);}
}

/* ================= METEOR ================= */
.meteor{
position:fixed;
inset:0;
background:radial-gradient(circle,orange,transparent);
opacity:0;
pointer-events:none;
z-index:9999;
}

.meteor.active{
animation:boom .5s ease;
}

@keyframes boom{
0%{opacity:0;}
50%{opacity:1;}
100%{opacity:0;}
}

/* ================= SOUND BUTTON ================= */
.sound-btn{
position:fixed;
bottom:20px;
right:20px;
z-index:999;
padding:10px;
border-radius:10px;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<h1>INITIALIZING SPACE SYSTEM🤖...</h1>
</div>

<div class="space"></div>
<div class="stars"></div>
<div class="planet" id="planet"></div>

<div class="meteor" id="meteor"></div>

<!-- MUSIC -->
<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<div class="container">

<img src="profile.jpg" class="profile">

<h2>@Kayyne</h2>
<p>Welcome To My Medsos✨</p>

<div class="link">WhatsApp</div>
<div class="link">Instagram</div>
<div class="link">TikTok</div>

</div>

<button class="sound-btn" onclick="toggleMusic()">🎵</button>

<script>

/* ================= MUSIC ================= */
let music=document.getElementById("music");
let play=false;

function toggleMusic(){
if(play){music.pause();play=false;}
else{music.play();play=true;}
}

/* ================= CURSOR TRAIL ================= */
document.addEventListener("mousemove",(e)=>{
const t=document.createElement("div");
t.className="trail";
t.style.left=e.clientX+"px";
t.style.top=e.clientY+"px";
document.body.appendChild(t);
setTimeout(()=>t.remove(),700);
});

/* ================= METEOR CLICK ================= */
document.querySelectorAll(".link").forEach(el=>{
el.addEventListener("click",()=>{
document.getElementById("meteor").classList.add("active");
setTimeout(()=>meteor.classList.remove("active"),500);
});
});

/* ================= PLANET CLICK ================= */
document.getElementById("planet").onclick=()=>{
alert("Planet Space Activated 🚀");
};

/* ================= INTRO REMOVE ================= */
setTimeout(()=>{
document.getElementById("intro").style.display="none";
},3500);

</script>

</body>
</html>
