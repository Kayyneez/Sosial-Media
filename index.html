<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kayyne</title>

<style>

/* ================= RESET ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:hidden;
position:relative;
background: radial-gradient(circle at top, #0b1a2a, #050a12 60%, #02050a);
}

/* ================= LOADER ================= */
#loader{
position:fixed;
inset:0;
background: radial-gradient(circle at center, #020b14, #000);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

#loader::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:
radial-gradient(circle at 30% 30%, rgba(255,0,150,0.2), transparent 40%),
radial-gradient(circle at 70% 60%, rgba(0,200,255,0.2), transparent 45%),
radial-gradient(circle at 50% 50%, rgba(120,0,255,0.15), transparent 60%);
filter:blur(60px);
animation:loaderNebula 4s ease-in-out infinite alternate;
}

@keyframes loaderNebula{
from{transform:scale(1);}
to{transform:scale(1.2);}
}

.loader-content{
text-align:center;
color:white;
z-index:2;
animation:fadePulse 2s infinite;
}

@keyframes fadePulse{
0%{transform:scale(1);opacity:0.6;}
50%{transform:scale(1.05);opacity:1;}
100%{transform:scale(1);opacity:0.6;}
}

.spinner{
width:60px;
height:60px;
border-radius:50%;
margin:0 auto 15px;
border:3px solid rgba(255,255,255,0.2);
border-top:3px solid #00ffff;
border-right:3px solid #ff00ff;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

/* ================= GALAXY ================= */
.stars{
position:fixed;
inset:0;
z-index:0;
overflow:hidden;
}

.stars::before,
.stars::after{
content:"";
position:absolute;
width:200%;
height:200%;
background-repeat:repeat;
background-image:
radial-gradient(2px 2px at 20px 30px,#fff,transparent),
radial-gradient(1px 1px at 80px 90px,#fff,transparent),
radial-gradient(1.5px 1.5px at 130px 40px,#fff,transparent),
radial-gradient(1px 1px at 200px 150px,#fff,transparent),
radial-gradient(2px 2px at 300px 200px,#fff,transparent);
background-size:300px 300px;
animation:moveStars 120s linear infinite;
opacity:0.35;
}

.stars::after{
transform:rotate(180deg);
opacity:0.15;
}

@keyframes moveStars{
from{transform:translateY(0);}
to{transform:translateY(-1200px);}
}

/* NEBULA */
.nebula{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 30%, rgba(255,0,150,0.25), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(0,200,255,0.25), transparent 45%),
radial-gradient(circle at 50% 50%, rgba(120,0,255,0.15), transparent 60%);
filter:blur(40px);
z-index:0;
animation:nebulaMove 10s ease-in-out infinite alternate;
}

@keyframes nebulaMove{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

/* SHOOTING STARS */
.shooting-stars{
position:fixed;
inset:0;
z-index:0;
}

.shooting-stars::before,
.shooting-stars::after{
content:"";
position:absolute;
width:3px;
height:3px;
background:white;
box-shadow:
100px 200px white,
300px 400px white,
600px 100px white,
900px 300px white;
animation:shoot 7s linear infinite;
}

.shooting-stars::after{
animation:shoot2 10s linear infinite;
opacity:0.5;
}

@keyframes shoot{
0%{transform:translate(0,0);opacity:0;}
10%{opacity:1;}
100%{transform:translate(500px,1000px);opacity:0;}
}

@keyframes shoot2{
0%{transform:translate(0,0);opacity:0;}
15%{opacity:1;}
100%{transform:translate(-600px,1000px);opacity:0;}
}

/* GLOW */
.bg-glow{
position:fixed;
width:300px;
height:300px;
border-radius:50%;
filter:blur(100px);
z-index:0;
animation:float 6s infinite ease-in-out;
}

.glow1{background:#ff00aa;top:-50px;left:-50px;}
.glow2{background:#00bfff;bottom:-50px;right:-50px;animation-delay:3s;}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(20px);}
100%{transform:translateY(0);}
}

/* ================= UI ================= */
.container{
width:100%;
max-width:420px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-radius:35px;
padding:30px 20px;
text-align:center;
position:relative;
z-index:1;
animation:floating 4s ease-in-out infinite;
box-shadow:0 0 40px rgba(0,0,0,0.5);
}

@keyframes floating{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

.profile{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid white;
}

/* TEXT */
h1{color:white;font-size:35px;margin-top:18px;}
.desc{color:#bbb;margin:8px 0 20px;font-size:14px;}

/* BUTTON */
.music-btn{
padding:10px 20px;
border:none;
border-radius:999px;
cursor:pointer;
font-weight:bold;
margin-bottom:20px;
}

/* LINKS */
.link{
display:flex;
align-items:center;
gap:15px;
padding:14px;
margin-bottom:18px;
border-radius:999px;
background:rgba(255,255,255,0.06);
text-decoration:none;
transition:.3s;
}

.link:hover{
transform:scale(1.03);
background:rgba(255,255,255,0.1);
}

.link img{
width:60px;
height:60px;
border-radius:50%;
}

/* WATERMARK */
.watermark{
margin-top:25px;
font-family:cursive;
font-weight:bold;
background:linear-gradient(90deg,#ff00ff,#00ffff,#fff,#ff00ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:rgbText 5s linear infinite;
}

@keyframes rgbText{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* ================= METEOR FLASH ================= */
.meteor-flash{
position:fixed;
inset:0;
pointer-events:none;
z-index:999999;
opacity:0;
background:
radial-gradient(circle at 50% 50%, rgba(255,140,0,0.9), transparent 40%),
radial-gradient(circle at 40% 60%, rgba(0,200,255,0.5), transparent 50%);
filter:blur(20px);
}

.meteor-active{
animation:meteorImpact .6s ease-out;
}

@keyframes meteorImpact{
0%{opacity:0;transform:scale(0.6);}
20%{opacity:1;}
50%{opacity:0.9;transform:scale(1.2);}
100%{opacity:0;transform:scale(1.5);}
}

@keyframes shake{
0%{transform:translate(0,0);}
25%{transform:translate(3px,-3px);}
50%{transform:translate(-3px,3px);}
75%{transform:translate(2px,2px);}
100%{transform:translate(0,0);}
}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="stars"></div>
<div class="nebula"></div>
<div class="shooting-stars"></div>
<div class="bg-glow glow1"></div>
<div class="bg-glow glow2"></div>

<!-- METEOR FLASH -->
<div class="meteor-flash" id="flash"></div>

<!-- LOADER -->
<div id="loader">
  <div class="loader-content">
    <div class="spinner"></div>
    <h1>Initializing Space...</h1>
    <p>loading galaxy system</p>
  </div>
</div>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<div class="container">

<img src="profile.jpg" class="profile">

<h1>@Kayyne</h1>
<p class="desc">welcome to my social media ✨</p>

<button class="music-btn" onclick="document.getElementById('music').play()">
🎵 Play Music
</button>

<a class="link" href="https://wa.me/6282241102321" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
<div>
  <h2 style="color:white">WhatsApp</h2>
  <p style="color:#bbb">Chat</p>
</div>
</a>

<a class="link" href="https://instagram.com/@too.dika" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
<div>
  <h2 style="color:white">Instagram</h2>
  <p style="color:#bbb">Follow</p>
</div>
</a>

<a class="link" href="https://tiktok.com/@kayyneee" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
<div>
  <h2 style="color:white">TikTok</h2>
  <p style="color:#bbb">Follow</p>
</div>
</a>

<p class="watermark">@Made By Kayyne</p>

</div>

<script>

/* METEOR CLICK EFFECT */
function flashEffect(){
const flash=document.getElementById("flash");
flash.classList.add("meteor-active");

document.body.style.animation="shake .3s";

setTimeout(()=>{
flash.classList.remove("meteor-active");
document.body.style.animation="";
},600);
}

document.querySelectorAll(".link").forEach(el=>{
el.addEventListener("click",flashEffect);
});

/* AUTO HIDE LOADER */
window.addEventListener("load",()=>{
setTimeout(()=>{
document.getElementById("loader").style.display="none";
},1800);
});

</script>

</body>
</html>
